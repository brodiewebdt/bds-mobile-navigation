<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Landing Page</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" />
    <link rel="stylesheet" href="css/styles.css" />
    <script src="js/script.js" defer></script>
  </head>
  <body>
    <a href="#main" class="skip visually-hidden">Skip to main content</a>

    <main id="main">
      <div class="wrapper">
        <div class="mobile-menu">
          <div class="profile">
            <img src="assets/images/aiony-haust-3TLl_97HNJo-unsplash.jpg" alt="Lisa Richardson avatar" class="profile__avatar" width="640" height="800" />
            <h2 class="profile__name">Lisa Richardson</h2>
            <p class="profile__title">Environmental meteorologist</p>
          </div>
          <!-- /.profile -->

          <nav class="mobile-menu__nav">
            <ul class="mobile-menu__list">
              <li class="mobile-menu__item">
                <button class="mobile-nav__link" aria-expanded="false">
                  <span class="mobile-nav__icon">
                    <img src="assets/images/heroicons_users-20-solid.svg" alt="" />
                  </span>
                  <span class="mobile-nav__label">Personal Data</span>
                  <span class="mobile-nav__arrow" aria-hidden="true">
                    <img src="assets/images/iconamoon_arrow-up-2.svg" alt="" width="16" height="16" />
                  </span>
                </button>
              </li>
              <li class="mobile-menu__item">
                <button class="mobile-nav__link" aria-expanded="false">
                  <span class="mobile-nav__icon">
                    <img src="assets/images/lets-icons_message-fill.svg" alt="" />
                  </span>
                  <span class="mobile-nav__label">Messages</span>
                  <span class="mobile-nav__arrow" aria-hidden="true">
                    <img src="assets/images/iconamoon_arrow-up-2.svg" alt="" width="16" height="16" />
                  </span>
                </button>
              </li>
              <li class="mobile-menu__item">
                <button class="mobile-nav__link" aria-expanded="false">
                  <span class="mobile-nav__icon">
                    <img src="assets/images/zondicons_notification.svg" alt="" />
                  </span>
                  <span class="mobile-nav__label">Notifications</span>
                  <span class="mobile-nav__arrow" aria-hidden="true">
                    <img src="assets/images/iconamoon_arrow-up-2.svg" alt="" width="16" height="16" />
                  </span>
                </button>
              </li>
              <li class="mobile-menu__item">
                <button class="mobile-nav__link" aria-expanded="false">
                  <span class="mobile-nav__icon">
                    <img src="assets/images/ic_round-location-on.svg" alt="" />
                  </span>
                  <span class="mobile-nav__label">Location</span>
                  <span class="mobile-nav__arrow" aria-hidden="true">
                    <img src="assets/images/iconamoon_arrow-up-2.svg" alt="" width="16" height="16" />
                  </span>
                </button>
              </li>
              <li class="mobile-menu__item">
                <button class="mobile-nav__link" aria-expanded="false">
                  <span class="mobile-nav__icon">
                    <img src="assets/images/flowbite_users-group-solid.svg" alt="" />
                  </span>
                  <span class="mobile-nav__label">Community</span>
                  <span class="mobile-nav__arrow" aria-hidden="true">
                    <img src="assets/images/iconamoon_arrow-up-2.svg" alt="" width="16" height="16" />
                  </span>
                </button>
              </li>
            </ul>
          </nav>
          <nav class="mobile-menu__settings">
            <ul class="mobile-menu__list">
              <li class="mobile-menu__item">
                <button class="mobile-nav__link" aria-expanded="false">
                  <span class="mobile-nav__icon"> <img src="assets/images/heroicons_users-20-solid.svg" alt="" /></span>
                  <span class="mobile-nav__label">FAQs</span>
                  <span class="mobile-nav__arrow" aria-hidden="true">
                    <img src="assets/images/iconamoon_arrow-up-2.svg" alt="" />
                  </span>
                </button>
              </li>
              <li class="mobile-menu__item">
                <button class="mobile-nav__link" aria-expanded="false">
                  <span class="mobile-nav__icon"> <img src="assets/images/fluent_settings-24-filled.svg" alt="" /></span>
                  <span class="mobile-nav__label">Settings</span>
                  <span class="mobile-nav__arrow" aria-hidden="true">
                    <img src="assets/images/iconamoon_arrow-up-2.svg" alt="" width="16" height="16" />
                  </span>
                </button>
              </li>
            </ul>
          </nav>
          <div class="action-bar">
            <ul class="action-bar__list">
              <li class="action-bar__item">
                <button class="mobile-nav__link action"><img src="assets/images/lets-icons_home.svg" alt="" /><span class="visually-hidden">Home</span></button>
              </li>
              <li class="action-bar__item">
                <button class="mobile-nav__link action"><img src="assets/images/akar-icons_statistic-up.svg" alt="" /><span class="visually-hidden">Statistics</span></button>
              </li>
              <li class="action-bar__item">
                <button class="mobile-nav__link action"><img src="assets/images/lets-icons_message.svg" alt="" /><span class="visually-hidden">Messages</span></button>
              </li>
              <li class="action-bar__item">
                <button class="mobile-nav__link action">
                  <span class="action-bar__accent">
                    <img src="assets/images/tdesign_user.svg" alt="" />
                  </span>
                  <span class="visually-hidden">User</span>
                </button>
              </li>
            </ul>
          </div>
          <!-- /.action-bar -->
        </div>
        <!-- /.mobile-menu -->
      </div>
      <!-- /.wrapper -->
    </main>
  </body>
</html>
